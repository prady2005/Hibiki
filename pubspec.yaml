name: music_app
description: A Flutter music app with album browser, search, and player functionality.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.9.1
  http: ^1.1.0
  intl: ^0.19.0
  google_fonts: ^6.0.0
  just_audio: ^0.9.36
  audio_session: ^0.1.25
  audio_service: ^0.18.18
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
